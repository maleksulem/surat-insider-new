<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1916" />
      <stop offset="100%" stop-color="#0E0C0B" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5A059" />
      <stop offset="50%" stop-color="#E5C384" />
      <stop offset="100%" stop-color="#A37F3C" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2" />
  
  <g transform="translate(400, 210)" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Starbursts / festive patterns representing events -->
    <path d="M 0 -80 L 0 80 M -80 0 L 80 0 M -55 -55 L 55 55 M -55 55 L 55 -55" stroke-width="2" opacity="0.6" />
    <circle cx="0" cy="0" r="10" fill="url(#goldGrad)" stroke="none" />
    <circle cx="0" cy="0" r="40" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />
    <circle cx="0" cy="0" r="60" stroke-width="1.5" opacity="0.3" />
    <!-- Festive lanterns -->
    <path d="M -120 -50 L -120 -10 M -120 -10 L -130 10 L -110 10 Z" stroke-width="2" opacity="0.7" />
    <path d="M 120 -50 L 120 -10 M 120 -10 L 110 10 L 130 10 Z" stroke-width="2" opacity="0.7" />
  </g>

  <text x="400" y="395" fill="#E5C384" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" letter-spacing="6" text-anchor="middle" opacity="0.6">THE CHRONICLES</text>
  <text x="400" y="430" fill="#F5EFE6" font-family="'Playfair Display', 'Georgia', serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="1">FESTIVALS &amp; EXPOS</text>
</svg>
