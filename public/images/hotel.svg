<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1916" />
      <stop offset="100%" stop-color="#0E0C0B" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5A059" />
      <stop offset="50%" stop-color="#E5C384" />
      <stop offset="100%" stop-color="#A37F3C" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2" />
  
  <g transform="translate(400, 210)" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Modern high-end hotel facade architectural line art -->
    <path d="M -120 100 L -120 -80 L 40 -80 L 40 100" stroke-width="3" opacity="0.8" />
    <path d="M 40 100 L 40 -30 L 120 -30 L 120 100" stroke-width="2" opacity="0.6" />
    
    <!-- Windows rows -->
    <rect x="-100" y="-60" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    <rect x="-60" y="-60" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    <rect x="-20" y="-60" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    
    <rect x="-100" y="-30" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    <rect x="-60" y="-30" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    <rect x="-20" y="-30" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    
    <rect x="-100" y="0" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    <rect x="-60" y="0" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    <rect x="-20" y="0" width="25" height="15" stroke-width="1.5" opacity="0.5" />
    
    <!-- Lobby entrance -->
    <path d="M -70 100 L -70 60 L -10 60 L -10 100" stroke-width="3" opacity="0.9" />
    <!-- Small pool / ripples in front -->
    <path d="M -160 110 C -80 100, 80 120, 160 110" stroke-width="1" opacity="0.4" />
  </g>

  <text x="400" y="395" fill="#E5C384" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" letter-spacing="6" text-anchor="middle" opacity="0.6">THE CHRONICLES</text>
  <text x="400" y="430" fill="#F5EFE6" font-family="'Playfair Display', 'Georgia', serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="1">PREMIUM HOTELS &amp; HAVENS</text>
</svg>
