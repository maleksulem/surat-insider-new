<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1916" />
      <stop offset="100%" stop-color="#0E0C0B" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5A059" />
      <stop offset="50%" stop-color="#E5C384" />
      <stop offset="100%" stop-color="#A37F3C" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2" />
  
  <g transform="translate(400, 210)" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Open journal pages -->
    <path d="M -120 60 C -60 50, -30 70, 0 60 C 30 70, 60 50, 120 60 L 120 -60 C 60 -70, 30 -50, 0 -60 C -30 -50, -60 -70, -120 -60 Z" opacity="0.8" />
    <line x1="0" y1="-60" x2="0" y2="60" stroke-width="1.5" opacity="0.5" />
    <!-- Journal text lines -->
    <line x1="-90" y1="-30" x2="-30" y2="-30" stroke-width="1.5" opacity="0.4" />
    <line x1="-90" y1="-10" x2="-40" y2="-10" stroke-width="1.5" opacity="0.4" />
    <line x1="-90" y1="10" x2="-50" y2="10" stroke-width="1.5" opacity="0.4" />
    
    <line x1="30" y1="-30" x2="90" y2="-30" stroke-width="1.5" opacity="0.4" />
    <line x1="30" y1="-10" x2="80" y2="-10" stroke-width="1.5" opacity="0.4" />
    <line x1="30" y1="10" x2="70" y2="10" stroke-width="1.5" opacity="0.4" />
  </g>

  <text x="400" y="395" fill="#E5C384" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" letter-spacing="6" text-anchor="middle" opacity="0.6">THE CHRONICLES</text>
  <text x="400" y="430" fill="#F5EFE6" font-family="'Playfair Display', 'Georgia', serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="1">INSIDER TALES &amp; CHRONICLES</text>
</svg>
