<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1916" />
      <stop offset="100%" stop-color="#0E0C0B" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5A059" />
      <stop offset="50%" stop-color="#E5C384" />
      <stop offset="100%" stop-color="#A37F3C" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2" />
  
  <g transform="translate(400, 210)" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Elegant swirling thread / fabric drape pattern -->
    <path d="M -150 100 Q -100 -80, 0 50 T 150 -100" stroke-width="3" opacity="0.8" />
    <path d="M -130 100 Q -80 -60, 20 70 T 170 -80" stroke-width="1.5" opacity="0.5" />
    <path d="M -170 100 Q -120 -100, -20 30 T 130 -120" stroke-width="1" opacity="0.3" />
    <!-- Intricate floral paisley block-print motif -->
    <path d="M 0 50 C 30 70, 40 100, 0 110 C -40 100, -30 70, 0 50" stroke-width="2" opacity="0.7" fill="url(#goldGrad)" fill-opacity="0.1" />
    <path d="M 0 65 C 15 75, 20 90, 0 95 C -20 90, -15 75, 0 65" stroke-width="1" opacity="0.4" />
  </g>

  <text x="400" y="395" fill="#E5C384" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" letter-spacing="6" text-anchor="middle" opacity="0.6">THE CHRONICLES</text>
  <text x="400" y="430" fill="#F5EFE6" font-family="'Playfair Display', 'Georgia', serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="1">BRIDAL BRIDESMAID &amp; SAREE QUEST</text>
</svg>
