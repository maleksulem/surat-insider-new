<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1916" />
      <stop offset="100%" stop-color="#0E0C0B" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5A059" />
      <stop offset="50%" stop-color="#E5C384" />
      <stop offset="100%" stop-color="#A37F3C" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2" />
  
  <g transform="translate(400, 210)" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Octagonal Historic Pond / Lake Outline -->
    <polygon points="0,-100 70,-70 100,0 70,70 0,100 -70,70 -100,0 -70,-70" stroke-width="3" opacity="0.8" />
    <!-- Water ripples inside -->
    <path d="M -50 -20 C -25 -25, 25 -25, 50 -20" stroke-width="1" opacity="0.4" />
    <path d="M -60 10 C -30 5, 30 5, 60 10" stroke-width="1" opacity="0.4" />
    <circle cx="0" cy="0" r="15" stroke-width="1.5" opacity="0.6" />
    <!-- Music Fountain spray lines coming out -->
    <path d="M 0 0 C -30 -40, -40 -85, -40 -85" stroke-width="1.5" opacity="0.5" />
    <path d="M 0 0 C 30 -40, 40 -85, 40 -85" stroke-width="1.5" opacity="0.5" />
    <path d="M 0 0 C -15 -50, -20 -95, -20 -95" stroke-width="1" opacity="0.3" />
    <path d="M 0 0 C 15 -50, 20 -95, 20 -95" stroke-width="1" opacity="0.3" />
  </g>

  <text x="400" y="395" fill="#E5C384" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" letter-spacing="6" text-anchor="middle" opacity="0.6">THE CHRONICLES</text>
  <text x="400" y="430" fill="#F5EFE6" font-family="'Playfair Display', 'Georgia', serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="1">GOPI TALAV &amp; LAKE</text>
</svg>
